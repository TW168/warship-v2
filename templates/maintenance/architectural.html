{% extends "base.html" %}
{% block title %}Software Architectural{% endblock %}

{% block head %}
<!-- Pygments syntax highlighting CSS (injected by the route) -->
<style>
  {{ pygments_css | safe }}
</style>
{% endblock %}

{% block content %}
<div class="container-fluid px-0">
  <div class="row g-0" style="min-height: calc(100vh - 60px);">

    <!-- ── TOC Sidebar ─────────────────────────────────────────── -->
    <div class="col-lg-3 col-xl-2 d-none d-lg-block bg-white border-end">
      <div id="toc-sidebar" class="sticky-top overflow-auto py-4 px-3" style="top: 56px; max-height: calc(100vh - 56px);">
        <p class="text-uppercase fw-semibold text-muted small mb-2 ps-1" style="letter-spacing: 0.08em;">
          Contents
        </p>
        <!-- TOC list is generated by JS from heading elements -->
        <nav aria-label="Page sections">
          <ul class="nav flex-column" id="toc-list"></ul>
        </nav>
      </div>
    </div>
    <!-- ── /TOC Sidebar ────────────────────────────────────────── -->

    <!-- ── Document content ───────────────────────────────────── -->
    <div class="col-lg-9 col-xl-10">
      <div class="px-4 px-lg-5 py-4">

        <!-- Breadcrumb -->
        <nav aria-label="breadcrumb" class="mb-3">
          <ol class="breadcrumb">
            <li class="breadcrumb-item text-muted">Maintenance</li>
            <li class="breadcrumb-item active" aria-current="page">Software Architectural</li>
          </ol>
        </nav>

        <!-- Rendered Markdown content -->
        <div id="arch-content" data-bs-spy="scroll" data-bs-target="#toc-list" tabindex="0">
          {{ html_content | safe }}
        </div>

        <!-- Back to top -->
        <div class="text-center mt-5 mb-3">
          <a href="#" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-up me-1"></i>Back to top
          </a>
        </div>

      </div>
    </div>
    <!-- ── /Document content ───────────────────────────────────── -->

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  /**
   * generateTOC — reads all h1/h2/h3 elements inside #arch-content,
   * assigns IDs where missing, and builds a Bootstrap nav list for scrollspy.
   */
  document.addEventListener('DOMContentLoaded', function () {
    const content = document.getElementById('arch-content');
    const tocList = document.getElementById('toc-list');

    if (!content || !tocList) return;

    // Collect headings h1, h2, h3
    const headings = content.querySelectorAll('h1, h2, h3');

    headings.forEach(function (heading, index) {
      // Assign a stable ID based on slug if not already set
      if (!heading.id) {
        heading.id = 'section-' + index + '-' + heading.textContent
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-+|-+$/g, '');
      }

      // Build the <li><a> TOC entry
      const li = document.createElement('li');
      li.className = 'nav-item';

      const a = document.createElement('a');
      a.className = 'nav-link';
      a.href = '#' + heading.id;
      a.textContent = heading.textContent.replace(/¶$/, '').trim(); // strip permalink symbol

      // Indent h3 deeper than h2, h1 is top-level
      if (heading.tagName === 'H3') {
        a.classList.add('toc-h3');
      } else if (heading.tagName === 'H2') {
        a.classList.add('toc-h2');
        // Add a light divider before each h2 group (except the first)
        if (tocList.children.length > 0) {
          const divider = document.createElement('li');
          divider.className = 'nav-item';
          divider.innerHTML = '<hr class="my-1 opacity-25">';
          tocList.appendChild(divider);
        }
      }

      li.appendChild(a);
      tocList.appendChild(li);
    });

    // Initialize Bootstrap Scrollspy on the body targeting the TOC list
    new bootstrap.ScrollSpy(document.body, {
      target: '#toc-list',
      rootMargin: '0px 0px -60%',
      threshold: [0.1],
    });
  });
</script>
{% endblock %}
