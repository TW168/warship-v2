{% extends "base.html" %}

{% block title %}Upload not in XFCMA{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 600px;">
  <h1 class="fw-bold mb-4" style="color: #154e9a;">
    <i class="bi bi-cloud-arrow-up me-2"></i>Upload not in XFCMA
  </h1>

  <div class="card shadow-sm">
    <div class="card-body p-4">
      <label for="pdfFile" class="form-label fw-semibold">QPQUPRFIL PDF File(s)</label>
      <input type="file" class="form-control mb-3" id="pdfFile" accept=".pdf,application/pdf" multiple>
      <button class="btn btn-primary w-100" id="uploadBtn" onclick="handleUpload()">
        <i class="bi bi-cloud-upload me-2"></i>Upload and Save to MySQL
      </button>
    </div>
  </div>

  <div id="resultBox" class="alert mt-4 d-none" role="alert"></div>
</div>

<script>
async function handleUpload() {
  const fileInput = document.getElementById('pdfFile');
  const btn = document.getElementById('uploadBtn');
  const resultBox = document.getElementById('resultBox');
  const files = Array.from(fileInput.files || []);

  if (files.length === 0) {
    resultBox.className = 'alert alert-warning mt-4';
    resultBox.textContent = 'Please select at least one PDF file.';
    resultBox.classList.remove('d-none');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Uploading…';
  resultBox.classList.add('d-none');

  const formData = new FormData();
  for (const f of files) formData.append('files', f);

  try {
    const res = await fetch('/maintenance/api/not-in-xfcma/upload', { method: 'POST', body: formData });
    const payload = await res.json();

    if (!res.ok) throw new Error(payload.detail || 'HTTP ' + res.status);

    resultBox.className = 'alert alert-success mt-4';
    let msg = '\u2713 ' + payload.message;
    if (payload.files && payload.files.length) {
      msg += '\n\n' + payload.files.map(f => '\u2022 ' + f.file + ': ' + f.inserted + ' rows').join('\n');
    }
    resultBox.innerText = msg;
    fileInput.value = '';
  } catch (err) {
    resultBox.className = 'alert alert-danger mt-4';
    resultBox.textContent = '\u2717 Upload failed: ' + err.message;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-cloud-upload me-2"></i>Upload and Save to MySQL';
    resultBox.classList.remove('d-none');
  }
}
</script>
{% endblock %}
