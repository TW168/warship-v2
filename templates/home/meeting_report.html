{% extends "base.html" %}
{% block title %}Meeting Report{% endblock %}

{% block content %}
<div class="container-fluid px-4 py-4">

  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a href="/" class="text-decoration-none">Release</a></li>
      <li class="breadcrumb-item active" aria-current="page">Meeting Report</li>
    </ol>
  </nav>

  <h1 class="page-header h3">
    <i class="bi bi-journal-text me-2" aria-hidden="true"></i>Meeting Report
  </h1>

  <!-- ── Filter form ──────────────────────────────────────────── -->
  <div class="card shadow-sm mb-4">
    <div class="card-header fw-semibold">
      <i class="bi bi-funnel me-2"></i>Report Filters
    </div>
    <div class="card-body">
      <form id="reportForm"
            hx-get="/api/meeting-report/results"
            hx-target="#results"
            hx-swap="innerHTML"
            hx-indicator="#spinner">

        <div class="row g-3 align-items-end">

          <div class="col-sm-6 col-lg-3">
            <label for="site" class="form-label fw-semibold">
              <i class="bi bi-geo-alt me-1 text-primary"></i>Site
            </label>
            <select class="form-select" id="site" name="site" required>
              <option value="AMAZ">AMAZ</option>
              <option value="AMJK" selected>AMJK</option>
              <option value="AMIN">AMIN</option>
              <option value="AMSC">AMSC</option>
              <option value="PFCH">PFCH</option>
              <option value="TXAS">TXAS</option>
              <option value="VAMT">VAMT</option>
            </select>
          </div>

          <div class="col-sm-6 col-lg-3">
            <label for="product_group" class="form-label fw-semibold">
              <i class="bi bi-boxes me-1 text-primary"></i>Product Group
            </label>
            <select class="form-select" id="product_group" name="product_group" required>
              <option value="BP">BP</option>
              <option value="CT">CT</option>
              <option value="SW" selected>SW</option>
            </select>
          </div>

          <div class="col-sm-6 col-lg-3">
            <label for="date" class="form-label fw-semibold">
              <i class="bi bi-calendar3 me-1 text-primary"></i>Truck Appointment Date
            </label>
            <input type="date" class="form-control" id="date" name="date" required />
          </div>

          <div class="col-sm-6 col-lg-3">
            <button type="submit" class="btn btn-primary w-100">
              <!-- Spinner shown by HTMX while request is in flight -->
              <span id="spinner" class="spinner-border spinner-border-sm me-2 htmx-indicator"
                    role="status" aria-hidden="true"></span>
              <i class="bi bi-bar-chart me-1"></i>Generate Report
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>
  <!-- ── /Filter form ─────────────────────────────────────────── -->

  <!-- ── Results area (populated by HTMX) ────────────────────── -->
  <div id="results">
    <!-- Empty state shown before first query -->
    <div class="text-center text-muted py-5">
      <i class="bi bi-bar-chart display-5 d-block mb-3" aria-hidden="true"></i>
      <p class="mb-0">Fill in the filters above and click <strong>Generate Report</strong> to load data.</p>
    </div>
  </div>
  <!-- ── /Results area ────────────────────────────────────────── -->

</div>
{% endblock %}
